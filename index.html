<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Carlos Acosta</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    
    <style>
        :root {
            --primary: #00ff88;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo { 
            font-weight: 800; 
            letter-spacing: 1px; 
            font-size: 1.4rem; 
            color: var(--primary); 
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            background: rgba(0, 255, 136, 0.02);
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .card p { opacity: 0.6; font-size: 0.9rem; line-height: 1.5; }
        
        .balance {
            font-size: 2rem;
            font-weight: bold;
            margin: 15px 0;
            color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">FINANCE<span>FLOW</span></div>
            <div style="font-size: 0.8rem; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 20px; color: var(--primary);">
                App v2.0
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Saldo Disponible</h3>
                <div class="balance">$0.00</div>
                <p>Actualizado en tiempo real desde la nube.</p>
                <button class="btn">Ver Movimientos</button>
            </div>

            <div class="card">
                <h3>Gastos de Web</h3>
                <p>Control de dominios, hosting y herramientas digitales.</p>
                <button class="btn" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);">Añadir Gasto</button>
            </div>

            <div class="card">
                <h3>Ventas Käsestangen</h3>
                <p>Registro de ventas de productos y recaudación de la Promo 2026.</p>
                <button class="btn">Registrar Venta</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log("FinanceFlow operativo."));
            });
        }
    </script>
</body>
</html>
