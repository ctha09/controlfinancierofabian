<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Elite v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="notification-area"></div>

<div class="container">
    <header class="glass-header">
        <h1 class="logo">💎 FinanceFlow <span class="promo">PROMO 2026</span></h1>
        <button class="theme-btn" id="themeBtn">🌙 MODO</button>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card balance">
            <span class="label">BALANCE NETO</span>
            <div class="value" id="kpi-balance">$0</div>
        </div>
        <div class="kpi-card income">
            <span class="label">INGRESOS</span>
            <div class="value" id="kpi-in">$0</div>
        </div>
        <div class="kpi-card expense">
            <span class="label">GASTOS</span>
            <div class="value" id="kpi-out">$0</div>
        </div>
    </div>

    <div class="main-layout">
        <aside class="glass-panel form-side">
            <h3>Nueva Operación</h3>
            <div class="input-box">
                <label>Descripción</label>
                <input type="text" id="desc" placeholder="Ej: Venta de käsestangen">
            </div>
            <div class="input-box">
                <label>Monto</label>
                <input type="number" id="amt" placeholder="0.00">
            </div>
            <div class="input-box">
                <label>Categoría</label>
                <select id="cat">
                    <option value="Ingresos Teóricos">💰 Ingresos Teóricos</option>
                    <option value="Ingresos Reales">💵 Ingresos Reales</option>
                    <option value="Egresos">📉 Egresos</option>
                    <option value="Gastos de Compra de Mercadería">📦 Compra Mercadería</option>
                    <option value="Compra de Inmuebles">🏠 Compra de Inmuebles</option>
                    <option value="Gastos Personales">🛍️ Gastos Personales</option>
                </select>
            </div>
            <button class="btn-main" id="addBtn">Registrar</button>
            <button class="btn-sub" id="clearBtn">Limpiar Historial</button>
        </aside>

        <main class="visual-side">
            <div class="glass-panel chart-container">
                <h4 class="chart-title">FLUJO DE CAJA</h4>
                <div class="canvas-h"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="glass-panel chart-container">
                <h4 class="chart-title">DISTRIBUCIÓN DE GASTOS</h4>
                <div class="canvas-h"><canvas id="pieChart"></canvas></div>
            </div>
        </main>

        <section class="glass-panel history-side">
            <h3>Historial</h3>
            <div id="list" class="list-wrapper"></div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
