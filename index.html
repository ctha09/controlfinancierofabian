<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Elite v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">💎 FinanceFlow Elite</h1>
        <button class="theme-btn" id="themeBtn">🌙 MODO OSCURO</button>
    </header>

    <div class="kpi-row">
        <div class="kpi-card"><span class="kpi-label">BALANCE NETO</span><div class="kpi-value" id="kpi-balance">$0</div></div>
        <div class="kpi-card"><span class="kpi-label">INGRESOS</span><div class="kpi-value income-text" id="kpi-in">$0</div></div>
        <div class="kpi-card"><span class="kpi-label">EGRESOS</span><div class="kpi-value expense-text" id="kpi-out">$0</div></div>
        <div class="kpi-card"><span class="kpi-label">PROVEEDORES</span><div class="kpi-value" id="kpi-providers" style="color:#a855f7">$0</div></div>
    </div>

    <div class="db-grid">
        <aside class="glass-panel">
            <h3>Nueva Operación</h3>
            <input type="text" id="desc" placeholder="Descripción">
            <input type="number" id="amt" placeholder="Monto">
            <select id="cat">
                <optgroup label="Entradas">
                    <option value="Ingresos Reales">Ingresos Reales</option>
                    <option value="Ingresos Teoricos">Ingresos Teóricos</option>
                </optgroup>
                <optgroup label="Salidas">
                    <option value="Egresos">Egresos General</option>
                    <option value="Compra de Mercaderia">Compra de Mercadería</option>
                    <option value="Compra de Inmuebles">Compra de Inmuebles</option>
                    <option value="Gastos Personales">Gastos Personales</option>
                </optgroup>
                <optgroup label="Proveedores">
                    <option value="Agronina">Agronina</option><option value="Arcor">Arcor</option>
                    <option value="Coca cola">Coca cola</option><option value="Cofra">Cofra</option>
                    <option value="Manaos">Manaos</option><option value="Sandro">Sandro</option>
                    </optgroup>
            </select>
            <button class="btn-add" id="addBtn">Registrar</button>
            
            <button class="btn-clear" id="clearBtn">🗑️ Limpiar Historial</button>
        </aside>

        <main class="charts-col">
            <div class="chart-container"><canvas id="lineChart"></canvas></div>
            <div class="chart-container"><canvas id="pieChart"></canvas></div>
        </main>

        <div class="glass-panel history-panel">
            <h3>Historial</h3>
            <div id="list"></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
