<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Elite</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>💎 FinanceFlow Elite</h1>
        <button id="themeBtn">🌙 MODO OSCURO</button>
    </header>

    <!-- KPIs -->
    <div class="kpi-row">
        <div class="kpi-card">
            <p>Balance</p>
            <h2 id="kpi-balance">$0</h2>
        </div>
        <div class="kpi-card">
            <p>Ingresos</p>
            <h2 id="kpi-in">$0</h2>
        </div>
        <div class="kpi-card">
            <p>Egresos</p>
            <h2 id="kpi-out">$0</h2>
        </div>
        <div class="kpi-card" id="openProvModal">
            <p>Proveedores</p>
            <h2 id="kpi-providers">$0</h2>
        </div>
    </div>

    <div class="db-grid">

        <!-- FORM -->
        <aside class="panel">
            <h3>Nueva Operación</h3>
            <input id="desc" placeholder="Descripción">
            <input id="amt" type="number" placeholder="Monto">
            <select id="cat">
                <option>Ingresos Reales</option>
                <option>Egresos</option>
                <option>Arcor</option>
                <option>Coca cola</option>
                <option>Ilolay</option>
            </select>

            <button id="addBtn">Registrar</button>
            <button id="clearBtn">Limpiar</button>
        </aside>

        <!-- CHARTS -->
        <main>
            <canvas id="lineChart"></canvas>
            <canvas id="pieChart"></canvas>
        </main>

        <!-- HISTORIAL -->
        <aside class="panel">
            <h3>Historial</h3>
            <div id="list"></div>
        </aside>

    </div>
</div>

<!-- MODAL -->
<div id="provModal" class="modal">
    <div class="modal-content">
        <button id="closeBtn">X</button>
        <h2>Proveedores</h2>
        <div id="modalBodyList"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
