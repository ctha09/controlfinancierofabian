<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Elite v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">💎 FinanceFlow Elite</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="theme-btn" id="themeBtn">🌙 / ☀️</button>
        </div>
    </header>

    <div class="month-nav glass-panel">
        <button onclick="changeDay(-1)" class="nav-btn">❮</button>
        <div style="position: relative; cursor: pointer; text-align: center;" onclick="document.getElementById('calendar-picker').showPicker()">
            <h2 id="current-date-display" style="margin:0; min-width: 200px;">Cargando...</h2>
            <input type="date" id="calendar-picker" style="position:absolute; top:0; left:0; opacity:0; width:100%; height:100%; cursor:pointer;" onchange="goToDate(this.value)">
        </div>
        <button onclick="changeDay(1)" class="nav-btn">❯</button>
    </div>

    <div class="kpi-row" id="main-kpis">
        <div class="kpi-card">
            <span class="kpi-label">BALANCE ACUMULADO</span>
            <div class="kpi-value" id="kpi-balance">$0</div>
        </div>
        <div class="kpi-card inc-border">
            <span class="kpi-label">➕ INGRESOS HOY</span>
            <div class="kpi-value inc-text" id="kpi-in">$0</div>
        </div>
        <div class="kpi-card exp-border">
            <span class="kpi-label">➖ EGRESOS HOY</span>
            <div class="kpi-value exp-text" id="kpi-out">$0</div>
        </div>
        <div class="kpi-card" style="border: 1px solid var(--accent);">
            <span class="kpi-label">📊 BALANCE DEL MES</span>
            <div class="kpi-value" id="kpi-month-net" style="color:var(--accent)">$0</div>
        </div>
    </div>

    <div class="db-grid" id="main-dashboard">
        <aside class="glass-panel">
            <h3>Nueva Operación</h3>
            <div class="form-group">
                <label>Fecha de Registro</label>
                <input type="text" id="display-date-form" disabled style="font-weight: bold; color: var(--accent);">
            </div>
            <div class="form-group"><label>Descripción</label><input type="text" id="desc" placeholder="Ej: Venta del día"></div>
            <div class="form-group"><label>Monto</label><input type="number" id="amt" placeholder="0.00"></div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="cat">
                    <option value="Ingresos Reales">💰 Ingresos Reales</option>
                    <option value="Ingresos Teoricos">📈 Ingresos Teóricos</option>
                    <option value="Egresos">📉 Egresos</option>
                    <option value="Compra Mercaderias">📦 Compra de Mercaderías</option>
                    <option value="Compra Inmuebles">🏠 Compra de Inmuebles</option>
                    <option value="Gastos Personales">👤 Gastos Personales</option>
                </select>
            </div>
            <div class="form-group">
                <label>Proveedor/Origen</label>
                <select id="prov">
                    <option value="Consumidor Final">Consumidor Final</option>
                    <option value="Hettinger">Hettinger</option>
                    <option value="Cofra">Cofra</option>
                    <option value="Pan Coló">Pan Coló</option>
                    <option value="Pan los Hermanos">Pan los Hermanos</option>
                    <option value="Ceferino">Ceferino</option>
                    <option value="La Agustina">La Agustina</option>
                    <option value="La casona">La casona</option>
                    <option value="Arcor">Arcor</option>
                    <option value="Mariano">Mariano</option>
                    <option value="Agronina">Agronina</option>
                    <option value="Sandro">Sandro</option>
                    <option value="Hann Verde">Hann Verde</option>
                    <option value="Jony Milanesa">Jony Milanesa</option>
                    <option value="Manaos">Manaos</option>
                    <option value="Mercosur">Mercosur</option>
                    <option value="Coca cola">Coca cola</option>
                    <option value="Distribuidora del igual">Distribuidora del igual</option>
                    <option value="JC distribución">JC distribución</option>
                    <option value="Ilolay">Ilolay</option>
                    <option value="Fredy Yerba">Fredy Yerba</option>
                    <option value="Kriller">Kriller</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn">Registrar</button>
            <button class="btn-clear" onclick="exportData()">💾 Exportar Backup</button>
            <button class="btn-clear" id="clearBtn">⚠️ Borrar Todo</button>
        </aside>

        <main class="charts-col">
            <div class="chart-container"><canvas id="lineChart"></canvas></div>
            <div class="chart-container"><canvas id="pieChart"></canvas></div>
        </main>

        <div class="glass-panel history-panel">
            <h3>Historial del Día</h3>
            <div id="list" class="transaction-list"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        window.location.reload();
                    }
                };
            };
        });
    }
</script>
</body>
</html>
