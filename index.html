<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="main-header">
        <div class="brand">
            <span class="icon">💎</span>
            <h1>FinanceFlow</h1>
        </div>
        <button class="theme-btn" id="themeBtn">🌙</button>
    </header>

    <section class="balance-hero">
        <p class="label">Balance Total Actual</p>
        <h2 id="kpi-balance">$0</h2>
        <div class="mini-stats">
            <div class="stat-item">
                <span class="dot green"></span>
                <span>Ingresos: <strong id="kpi-in" class="income-text">$0</strong></span>
            </div>
            <div class="stat-item">
                <span class="dot red"></span>
                <span>Gastos: <strong id="kpi-out" class="expense-text">$0</strong></span>
            </div>
        </div>
    </section>

    <section class="glass-panel form-card">
        <h3>Nueva Operación</h3>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="Descripción (ej: Venta mercadería)">
            <input type="number" id="amt" placeholder="Monto (0.00)" step="0.01">
            <select id="cat">
                <option value="Ingresos Teóricos">💰 Ingresos Teóricos</option>
                <option value="Ingresos Reales">💵 Ingresos Reales</option>
                <option value="Egresos">📉 Egresos</option>
                <option value="Gastos de Compra de Mercadería">📦 Compra Mercadería</option>
                <option value="Compra de Inmuebles">🏠 Compra de Inmuebles</option>
                <option value="Gastos Personales">🛍️ Gastos Personales</option>
            </select>
        </div>
        <button class="btn-primary" id="addBtn">Registrar Movimiento</button>
    </section>

    <section class="visuals-grid">
        <div class="glass-panel chart-box">
            <p class="chart-label">Flujo de Caja</p>
            <div class="canvas-wrapper"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="glass-panel chart-box">
            <p class="chart-label">Distribución de Egresos</p>
            <div class="canvas-wrapper"><canvas id="pieChart"></canvas></div>
        </div>
    </section>

    <section class="glass-panel history-card">
        <div class="history-header">
            <h3>Actividad Reciente</h3>
            <button class="btn-text" id="clearBtn">Limpiar historial</button>
        </div>
        <div id="list" class="transaction-list"></div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
