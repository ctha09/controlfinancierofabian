<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Elite v6.0 - Gestión Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">💎 FinanceFlow Elite</h1>
        <button class="theme-btn" id="themeBtn">🌙 MODO OSCURO</button>
    </header>

    <div class="kpi-row">
        <div class="kpi-card">
            <span class="kpi-label">BALANCE NETO</span>
            <div class="kpi-value" id="kpi-balance">$0</div>
        </div>
        <div class="kpi-card income-card">
            <span class="kpi-label">INGRESOS (REAL + TEOR)</span>
            <div class="kpi-value income-text" id="kpi-in">$0</div>
        </div>
        <div class="kpi-card expense-card">
            <span class="kpi-label">TOTAL EGRESOS</span>
            <div class="kpi-value expense-text" id="kpi-out">$0</div>
        </div>
    </div>

    <div class="db-grid">
        <aside class="glass-panel form-section">
            <h3>Nueva Operación</h3>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="desc" placeholder="Ej: Factura de Harina">
            </div>
            <div class="form-group">
                <label>Monto</label>
                <input type="number" id="amt" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="cat">
                    <option value="Ingresos Reales">💰 Ingresos Reales</option>
                    <option value="Ingresos Teoricos">📈 Ingresos Teóricos</option>
                    <option value="Egresos">📉 Egresos</option>
                    <option value="Compra Mercaderias">📦 Compra de Mercaderías</option>
                    <option value="Compra Inmuebles">🏠 Compra de Inmuebles</option>
                    <option value="Gastos Personales">👤 Gastos Personales</option>
                </select>
            </div>
            <div class="form-group">
                <label>Proveedor / Origen</label>
                <select id="prov">
                    <option value="Consumidor Final">— Consumidor Final / Otro —</option>
                    <option value="Hettinger">Hettinger</option>
                    <option value="Cofra">Cofra</option>
                    <option value="Pan Coló">Pan Coló</option>
                    <option value="Pan los Hermanos">Pan los Hermanos</option>
                    <option value="Ceferino">Ceferino</option>
                    <option value="La Agustina">La Agustina</option>
                    <option value="La casona">La casona</option>
                    <option value="Arcor">Arcor</option>
                    <option value="Mariano">Mariano</option>
                    <option value="Agronina">Agronina</option>
                    <option value="Sandro">Sandro</option>
                    <option value="Hann Verde">Hann Verde</option>
                    <option value="Jony Milanesa">Jony Milanesa</option>
                    <option value="Manaos">Manaos</option>
                    <option value="Mercosur">Mercosur</option>
                    <option value="Coca cola">Coca cola</option>
                    <option value="Distribuidora del igual">Distribuidora del igual</option>
                    <option value="JC distribución">JC distribución</option>
                    <option value="Ilolay">Ilolay</option>
                    <option value="Fredy Yerba">Fredy Yerba</option>
                    <option value="Kriller">Kriller</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn">Registrar</button>
            <button class="btn-clear" id="clearBtn">Limpiar Historial</button>
        </aside>

        <main class="charts-col">
            <div class="chart-container" id="lineBox">
                <h4 class="chart-title">FLUJO DE CAJA (EVOLUCIÓN) 🔍</h4>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-container" id="pieBox">
                <h4 class="chart-title">DISTRIBUCIÓN POR CATEGORÍA 🔍</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </main>

        <div class="glass-panel history-panel">
            <h3>Historial de Movimientos</h3>
            <div id="list" class="transaction-list"></div>
        </div>
    </div>
</div>

<div id="chartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-body">
            <canvas id="zoomedChart"></canvas>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
