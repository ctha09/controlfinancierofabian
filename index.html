<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Session v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1 class="logo">💎 FinanceFlow</h1>
        <button class="theme-toggle" id="themeBtn">🌙</button>
    </header>

    <div class="kpi-container">
        <div class="kpi-card main-balance">
            <span class="kpi-label">BALANCE SESIÓN ACTUAL</span>
            <div class="kpi-value" id="kpi-balance">$0</div>
        </div>
        <div class="kpi-sub-row">
            <div class="kpi-card income-card">
                <span class="kpi-label">INGRESOS</span>
                <div class="kpi-value income-text" id="kpi-in">$0</div>
            </div>
            <div class="kpi-card expense-card">
                <span class="kpi-label">EGRESOS</span>
                <div class="kpi-value expense-text" id="kpi-out">$0</div>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <section class="glass-panel action-panel">
            <h3 class="section-title">Nueva Operación</h3>
            <div class="form-grid">
                <input type="text" id="desc" placeholder="Descripción" class="mobile-input">
                <input type="number" id="amt" placeholder="Monto $0.00" class="mobile-input">
                <select id="cat" class="mobile-input">
                    <option value="Ingresos Reales">💰 Ingresos Reales</option>
                    <option value="Ingresos Teoricos">📊 Ingresos Teóricos</option>
                    <option value="Egresos">📉 Egresos</option>
                    <option value="Mercaderias">📦 Mercaderías</option>
                    <option value="Inmuebles">🏠 Inmuebles</option>
                    <option value="Gastos Personales">👤 Personales</option>
                </select>
                <button class="btn-primary" id="addBtn">Añadir a la lista</button>
            </div>
        </section>

        <section class="charts-section">
            <div class="chart-card" id="lineBox">
                <div class="chart-header"><span>FLUJO DE CAJA</span></div>
                <div class="canvas-wrapper"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="chart-card" id="pieBox">
                <div class="chart-header"><span>DISTRIBUCIÓN CATEGORÍAS</span></div>
                <div class="canvas-wrapper"><canvas id="pieChart"></canvas></div>
            </div>
        </section>

        <section class="glass-panel history-section">
            <div class="history-header">
                <h3 class="section-title">Historial de Sesión</h3>
                <button id="clearBtn" class="btn-text-only">Limpiar pantalla</button>
            </div>
            <div id="list" class="transaction-list"></div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
