<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Elite v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5501/5501375.png">
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">💎 FinanceFlow Elite</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="theme-btn" id="themeBtn">🌙 / ☀️</button>
        </div>
    </header>

    <div class="month-nav glass-panel">
        <button onclick="changeMonth(-1)" class="nav-btn">❮</button>
        <h2 id="current-month-display">Abril 2026</h2>
        <button onclick="changeMonth(1)" class="nav-btn">❯</button>
    </div>

    <div class="kpi-row" id="main-kpis">
        <div class="kpi-card">
            <span class="kpi-label">BALANCE MENSUAL</span>
            <div class="kpi-value" id="kpi-balance">$0</div>
        </div>
        <div class="kpi-card inc-border">
            <span class="kpi-label">➕ INGRESOS</span>
            <div class="kpi-value inc-text" id="kpi-in">$0</div>
        </div>
        <div class="kpi-card exp-border">
            <span class="kpi-label">➖ EGRESOS</span>
            <div class="kpi-value exp-text" id="kpi-out">$0</div>
        </div>
        <div class="kpi-card" id="kpi-prov-card" style="cursor:pointer; border: 1px solid var(--accent);">
            <span class="kpi-label">🏢 PROVEEDORES</span>
            <div class="kpi-value" id="kpi-prov-count" style="color:var(--accent)">0</div>
        </div>
    </div>

    <div class="db-grid" id="main-dashboard">
        <aside class="glass-panel">
            <h3>Nueva Operación</h3>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="desc" placeholder="Ej: Pago de Harina">
            </div>
            <div class="form-group">
                <label>Monto</label>
                <input type="number" id="amt" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="cat">
                    <option value="Ingresos Reales">💰 Ingresos Reales</option>
                    <option value="Ingresos Teoricos">📈 Ingresos Teóricos</option>
                    <option value="Egresos">📉 Egresos</option>
                    <option value="Compra Mercaderias">📦 Compra de Mercaderías</option>
                    <option value="Compra Inmuebles">🏠 Compra de Inmuebles</option>
                    <option value="Gastos Personales">👤 Gastos Personales</option>
                </select>
            </div>
            <div class="form-group">
                <label>Proveedor</label>
                <select id="prov">
                    <option value="Consumidor Final">Consumidor Final</option>
                    <option value="Hettinger">Hettinger</option>
                    <option value="Cofra">Cofra</option>
                    <option value="Pan Coló">Pan Coló</option>
                    <option value="Pan los Hermanos">Pan los Hermanos</option>
                    <option value="Ceferino">Ceferino</option>
                    <option value="La Agustina">La Agustina</option>
                    <option value="La casona">La casona</option>
                    <option value="Arcor">Arcor</option>
                    <option value="Mariano">Mariano</option>
                    <option value="Agronina">Agronina</option>
                    <option value="Sandro">Sandro</option>
                    <option value="Hann Verde">Hann Verde</option>
                    <option value="Jony Milanesa">Jony Milanesa</option>
                    <option value="Manaos">Manaos</option>
                    <option value="Mercosur">Mercosur</option>
                    <option value="Coca cola">Coca cola</option>
                    <option value="Distribuidora del igual">Distribuidora del igual</option>
                    <option value="JC distribución">JC distribución</option>
                    <option value="Ilolay">Ilolay</option>
                    <option value="Fredy Yerba">Fredy Yerba</option>
                    <option value="Kriller">Kriller</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn">Registrar</button>
            <button class="btn-clear" id="exportBtn" onclick="exportData()">💾 Exportar Backup</button>
            <button class="btn-clear" id="clearBtn">⚠️ Borrar Todo</button>
        </aside>

        <main class="charts-col">
            <div class="chart-container"><canvas id="lineChart"></canvas></div>
            <div class="chart-container"><canvas id="pieChart"></canvas></div>
        </main>

        <div class="glass-panel history-panel">
            <h3>Historial del Mes</h3>
            <div id="list" class="transaction-list"></div>
        </div>
    </div>

    <div id="view-proveedores" class="glass-panel" style="display:none;">
        <div class="header-flex">
            <h2>Proveedores Activos</h2>
            <button class="theme-btn" onclick="showMainView()">✕ Cerrar</button>
        </div>
        <div id="prov-grid" class="prov-grid"></div>
    </div>

    <div id="view-detalle-proveedor" class="glass-panel" style="display:none;">
        <div class="header-flex">
            <h2 id="detalle-nombre-prov">Nombre</h2>
            <button class="theme-btn" onclick="showProvidersView()">← Volver</button>
        </div>
        <div id="prov-history-list" class="transaction-list"></div>
    </div>
</div>

<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
