<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">

    <style>
        body {
            background-color: #000;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 90%;
            max-width: 1000px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-text { color: #00ff88; font-weight: 900; font-size: 1.5rem; }
        .version-badge { border: 1px solid #00ff88; color: #00ff88; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 30px;
            border-radius: 25px;
        }

        .card h3 { margin-top: 0; font-size: 1.2rem; }
        .card p { color: #888; font-size: 0.8rem; }
        
        .balance-text { color: #00ff88; font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        .balance-symbol { color: #444; }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-green { background: #00ff88; color: #000; }
        .btn-outline { background: transparent; border: 1px solid #00ff88; color: #00ff88; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-text">FINANCEFLOW</div>
        <div class="version-badge">App v2.0</div>
    </div>

    <div class="cards-grid">
        <div class="card">
            <h3>Saldo Disponible</h3>
            <div class="balance-text"><span class="balance-symbol">$</span>0.00</div>
            <p>Actualizado en tiempo real desde la nube.</p>
            <button class="btn btn-green">Ver Movimientos</button>
        </div>

        <div class="card">
            <h3>Gastos de Web</h3>
            <p>Control de dominios, hosting y herramientas digitales.</p>
            <button class="btn btn-outline">Añadir Gasto</button>
        </div>

        <div class="card">
            <h3>Ventas Käsestangen</h3>
            <p>Registro de ventas de productos y recaudación de la Promo 2026.</p>
            <button class="btn btn-green">Registrar Venta</button>
        </div>
    </div>

    <script>
        // Registro simple del Service Worker para que sea instalable
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
